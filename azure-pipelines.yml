trigger:
  branches:
    include:
      - main

pool:
  name: 'SelfHostedPool'

variables:
  terraformVersion: '1.8.5'
  azureServiceConnection: 'azure-devops-connection'

steps:
  - checkout: self
    displayName: 'Checkout repository'

  - task: DownloadSecureFile@1
    name: sshPublicKey
    displayName: 'Download SSH public key'
    inputs:
      secureFile: 'id_rsa.pub'

  - script: |
      sudo apt-get update
      sudo apt-get install -y unzip curl
    displayName: 'Install required packages'

  - script: |
      set -e
      echo "Installing Terraform $(terraformVersion)..."
      curl -Lo terraform.zip https://releases.hashicorp.com/terraform/$(terraformVersion)/terraform_$(terraformVersion)_linux_amd64.zip
      unzip -o terraform.zip
      sudo mv terraform /usr/local/bin/
      terraform version
    displayName: 'Install Terraform'

  - script: |
      mkdir -p ~/.ssh
      cp "$(sshPublicKey.secureFilePath)" ~/.ssh/id_rsa.pub
      chmod 644 ~/.ssh/id_rsa.pub
      ls -l ~/.ssh
    displayName: 'Prepare SSH Public Key'

  - task: AzureCLI@2
    displayName: 'Terraform Init'
    inputs:
      azureSubscription: '$(azureServiceConnection)'
      addSpnToEnvironment: true
      scriptType: 'bash'
      scriptLocation: 'inlineScript'
      inlineScript: |
        set -e

        export ARM_CLIENT_ID="$servicePrincipalId"
        export ARM_CLIENT_SECRET="$servicePrincipalKey"
        export ARM_TENANT_ID="$tenantId"
        export ARM_SUBSCRIPTION_ID=$(az account show --query id -o tsv)

        echo "Using subscription: $ARM_SUBSCRIPTION_ID"

        terraform -chdir="$(Build.SourcesDirectory)" init -reconfigure

  - task: AzureCLI@2
    displayName: 'Terraform Plan'
    inputs:
      azureSubscription: '$(azureServiceConnection)'
      addSpnToEnvironment: true
      scriptType: 'bash'
      scriptLocation: 'inlineScript'
      inlineScript: |
        set -e

        export ARM_CLIENT_ID="$servicePrincipalId"
        export ARM_CLIENT_SECRET="$servicePrincipalKey"
        export ARM_TENANT_ID="$tenantId"
        export ARM_SUBSCRIPTION_ID=$(az account show --query id -o tsv)

        terraform -chdir="$(Build.SourcesDirectory)" plan -out=tfplan

  - task: AzureCLI@2
    displayName: 'Terraform Apply'
    inputs:
      azureSubscription: '$(azureServiceConnection)'
      addSpnToEnvironment: true
      scriptType: 'bash'
      scriptLocation: 'inlineScript'
      inlineScript: |
        set -e

        export ARM_CLIENT_ID="$servicePrincipalId"
        export ARM_CLIENT_SECRET="$servicePrincipalKey"
        export ARM_TENANT_ID="$tenantId"
        export ARM_SUBSCRIPTION_ID=$(az account show --query id -o tsv)

        terraform -chdir="$(Build.SourcesDirectory)" apply -auto-approve tfplan

  - task: AzureCLI@2
    displayName: 'Capture Terraform Outputs'
    inputs:
      azureSubscription: '$(azureServiceConnection)'
      addSpnToEnvironment: true
      scriptType: 'bash'
      scriptLocation: 'inlineScript'
      inlineScript: |
        set -e

        export ARM_CLIENT_ID="$servicePrincipalId"
        export ARM_CLIENT_SECRET="$servicePrincipalKey"
        export ARM_TENANT_ID="$tenantId"
        export ARM_SUBSCRIPTION_ID=$(az account show --query id -o tsv)

        PUBLIC_IP=$(terraform -chdir="$(Build.SourcesDirectory)" output -raw public_ip)
        DB_HOST=$(terraform -chdir="$(Build.SourcesDirectory)" output -raw db_host)

        echo "public_ip=$PUBLIC_IP"
        echo "db_host=$DB_HOST"

        echo "##vso[task.setvariable variable=public_ip]$PUBLIC_IP"
        echo "##vso[task.setvariable variable=db_host]$DB_HOST"

  - script: |
      echo "Terraform deployment completed."
      echo "Public IP: $(public_ip)"
      echo "DB Host: $(db_host)"
    displayName: 'Show Terraform Outputs'